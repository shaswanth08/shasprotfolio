<!DOCTYPE html>
<html>
<head>
    <title>Student College Details Form</title>
</head>
<body>

    <h2>Student College Details</h2>

    <form>

        <label>Student Name:</label><br>
        <input type="text" name="studentname" required><br><br>

        <label>Register Number:</label><br>
        <input type="text" name="regno" required><br><br>

        <label>College Name:</label><br>
        <input type="text" name="college" required><br><br>

        <label>Department:</label><br>
        <input type="text" name="department" required><br><br>

        <label>Year of Study:</label><br>
        <select name="year" required>
            <option value="">Select Year</option>
            <option>1st Year</option>
            <option>2nd Year</option>
            <option>3rd Year</option>
            <option>4th Year</option>
        </select><br><br>

        <label>Section:</label><br>
        <input type="text" name="section"><br><br>

        <label>Email:</label><br>
        <input type="email" name="email" required><br><br>

        <label>Mobile Number:</label><br>
        <input type="tel" name="mobile" required><br><br>

        <input type="submit" value="Submit">
        <input type="reset" value="Reset">

    </form>

</body>
</html>
